<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Demo — Regace AI</title>
  <link rel="icon" type="image/png" href="regace-small.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #FAFAFA;
      --black: #0A0A0A;
      --red: #D42020;
      --red-dark: #A81818;
      --gray-100: #F0F0F0;
      --gray-200: #E0E0E0;
      --gray-400: #999;
      --gray-600: #666;
      --maroon: #5C0A1B;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      padding: 0 clamp(24px, 5vw, 80px);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-200);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--black);
    }

    .nav-logo img {
      height: 28px;
      width: auto;
    }

    .nav-back {
      font-size: 14px;
      color: var(--gray-600);
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--black); }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 60px clamp(24px, 5vw, 80px);
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .page-title {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 8px;
    }

    .page-title em {
      font-style: italic;
      color: var(--red);
    }

    .page-sub {
      text-align: center;
      color: var(--gray-600);
      font-size: 15px;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .calendly-container {
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px -15px rgba(0,0,0,0.06);
    }

    /* ── FOOTER ── */
    footer {
      padding: 32px clamp(24px, 5vw, 80px);
      background: var(--maroon);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .footer-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .footer-links a {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--white); }

    @media (max-width: 768px) {
      footer { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="regace-logo.png" alt="Regace AI" />
    </a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 1l-5 5 5 5"/></svg>
      Back to home
    </a>
  </nav>

  <main>
    <h1 class="page-title">Schedule a <em>Demo</em></h1>
    <p class="page-sub">Pick a time that works for you and we'll walk you through Regace AI.</p>
    <div class="calendly-container">
      <!-- Calendly inline widget begin -->
      <div class="calendly-inline-widget" data-url="https://calendly.com/hingetanmay/regace-ai-discovery-call" style="min-width:320px;height:700px;"></div>
      <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
      <!-- Calendly inline widget end -->
    </div>
  </main>

  <footer>
    <div class="footer-left">&copy; 2026 Regace AI. All rights reserved.</div>
    <ul class="footer-links">
      <li><a href="#">Privacy</a></li>
      <li><a href="#">Terms</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </footer>
</body>
</html>
